// --- HOOKS ---

const useIntersectionObserver = (options = { threshold: 0.1 }) => {
  const [inView, setInView] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        setInView(true);
        observer.unobserve(entry.target);
      }
    }, options);
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, []);
  return [ref, inView];
};

const useMousePosition = () => {
  const [position, setPosition] = useState({ x: 0, y: 0 });
  const [isHovering, setIsHovering] = useState(false);

  useEffect(() => {
    const updatePosition = (e) => setPosition({ x: e.clientX, y: e.clientY });
    const handleMouseOver = (e) => {
      if (e.target.tagName.toLowerCase() === 'button' || e.target.tagName.toLowerCase() === 'a' || e.target.closest('.interactive')) {
        setIsHovering(true);
      } else {
        setIsHovering(false);
      }
    };

    window.addEventListener('mousemove', updatePosition);
    window.addEventListener('mouseover', handleMouseOver);
    return () => {
      window.removeEventListener('mousemove', updatePosition);
      window.removeEventListener('mouseover', handleMouseOver);
    };
  }, []);
  return { ...position, isHovering };
};

const useScrollDirection = () => {
  const [scrollDir, setScrollDir] = useState('up');
  const [isTop, setIsTop] = useState(true);

  useEffect(() => {
    let lastScrollY = window.pageYOffset;
    const updateScrollDir = () => {
      const scrollY = window.pageYOffset;
      setIsTop(scrollY < 50);
      const direction = scrollY > lastScrollY ? 'down' : 'up';
      if (direction !== scrollDir && (scrollY - lastScrollY > 10 || scrollY - lastScrollY < -10)) {
        setScrollDir(direction);
      }
      lastScrollY = scrollY > 0 ? scrollY : 0;
    };
    window.addEventListener('scroll', updateScrollDir);
    return () => window.removeEventListener('scroll', updateScrollDir);
  }, [scrollDir]);
  return { scrollDir, isTop };
};

const useTyping = (text, speed = 100) => {
  const [displayed, setDisplayed] = useState('');
  useEffect(() => {
    let i = 0;
    setDisplayed('');
    const timer = setInterval(() => {
      if (i < text.length) {
        setDisplayed(prev => prev + text.charAt(i));
        i++;
      } else {
        clearInterval(timer);
      }
    }, speed);
    return () => clearInterval(timer);
  }, [text, speed]);
  return displayed;
};

// --- REUSABLE COMPONENTS ---

const FadeUp = ({ children, delay = 0, className = '' }) => {
  const [ref, inView] = useIntersectionObserver();
  return (
    <div 
      ref={ref} 
      className={`transition-all duration-1000 ease-out ${inView ? 'opacity-100 translate-y-0 blur-0' : 'opacity-0 translate-y-16 blur-[4px]'} ${className}`}
      style={{ transitionDelay: `${delay}ms` }}
    >
      {children}
    </div>
  );
};

const TiltCard = ({ children, className = '' }) => {
  const ref = useRef(null);
  const [style, setStyle] = useState({});

  const handleMouseMove = (e) => {
    if (!ref.current) return;
    const { left, top, width, height } = ref.current.getBoundingClientRect();
    const x = (e.clientX - left - width / 2) / 20; // rotation intensity
    const y = (e.clientY - top - height / 2) / -20;
    setStyle({ transform: `rotateY(${x}deg) rotateX(${y}deg) scale3d(1.02, 1.02, 1.02)` });
  };

  const handleMouseLeave = () => {
    setStyle({ transform: 'rotateY(0deg) rotateX(0deg) scale3d(1, 1, 1)' });
  };

  return (
    <div className={`tilt-wrapper interactive ${className}`}>
      <div 
        ref={ref}
        onMouseMove={handleMouseMove}
        onMouseLeave={handleMouseLeave}
        className="tilt-inner w-full h-full glass-card rounded-2xl overflow-hidden shadow-2xl"
        style={style}
      >
        {children}
      </div>
    </div>
  );
};

const StatCard = ({ number, suffix, label, delay, color }) => {
  const [ref, inView] = useIntersectionObserver();
  const [count, setCount] = useState(0);

  useEffect(() => {
    if (!inView) return;
    let start = 0;
    const duration = 2000;
    const increment = number / (duration / 16);
    const timer = setInterval(() => {
      start += increment;
      if (start >= number) {
        setCount(number);
        clearInterval(timer);
      } else {
        setCount(Math.ceil(start));
      }
    }, 16);
    return () => clearInterval(timer);
  }, [inView, number]);

  return (
    <FadeUp delay={delay}>
      <div ref={ref} className="glass-card p-6 rounded-2xl border-t-2 transition-transform hover:-translate-y-2" style={{ borderTopColor: color }}>
        <h3 className="font-heading text-4xl md:text-5xl font-black mb-2" style={{ color }}>{count}{suffix}</h3>
        <p className="font-code text-[var(--text-sub)] text-sm uppercase tracking-wider">{label}</p>
      </div>
    </FadeUp>
  );
};
